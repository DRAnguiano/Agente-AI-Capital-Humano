schema: spec-driven

# Project context shown to AI when creating artifacts.
context: |
  Agente AI Capital Humano Transmontes — bot de reclutamiento "Mundo" para operadores
  de camión (sencillo / full) que opera por WhatsApp/Telegram vía Chatwoot.

  Objetivo de negocio: un reclutador abre Chatwoot y ve un perfil de candidato
  completo y accionable (ciudad, vehículo, licencia, apto médico, experiencia,
  documentos, foráneo, faltantes, siguiente acción) SIN leer todo el chat.
  (La "temperatura" del lead queda deprecada: no se muestra en la nota privada.)

  Stack: Python 3.12, FastAPI, Celery (worker + beat), PostgreSQL 16, Neo4j 5,
  ChromaDB + BAAI/bge-m3 (RAG), Groq (LLM: 70B para generación, 8b-instant para
  clasificación), Redis (broker + rate limit), Nginx (gateway), ngrok (túnel).
  Todo corre en Docker (docker-compose.yml + docker-compose.neo4j.yml).

  Detalle completo de arquitectura, módulos y constraints: ver CONTEXTO.md en la raíz
  y openspec/project.md.

  Convenciones de las specs:
  - Idioma: español para texto de negocio; nombres de capability en kebab-case inglés.
  - Las preguntas de perfil ("funnel") las emite el SISTEMA, nunca el LLM.
  - Prioridad de fuentes de verdad: turno actual > lead_memory > Neo4j > RAG > LLM.
  - RAG responde políticas HR; NUNCA decide facts del candidato.
  - La nota privada de Chatwoot es display-only, nunca fuente de verdad.

rules:
  proposal:
    - Incluir siempre una sección de Impact con archivos/servicios afectados.
  tasks:
    - Cada tarea debe ser verificable (build, smoke test o log observable).
