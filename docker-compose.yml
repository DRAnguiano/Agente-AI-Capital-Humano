services:
  #######################################
  # POSTGRES PRINCIPAL RH / FASTAPI
  #######################################
  postgres:
    image: postgres:16
    container_name: hr_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrdb}
      POSTGRES_USER: ${POSTGRES_USER:-hr_david}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  #######################################
  # FASTAPI ORQUESTADOR RH / RAG / GROQ
  #######################################
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-rag-api:latest
    container_name: hr_rag_api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hrdb}
      POSTGRES_USER: ${POSTGRES_USER:-hr_david}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_password}

      # FastAPI habla con Chatwoot por red interna Docker.
      CHATWOOT_BASE_URL: http://chatwoot_rails:3000

      HF_HOME: /app/.cache
      SENTENCE_TRANSFORMERS_HOME: /app/.cache

      CELERY_BROKER_URL: redis://chatwoot_redis:6379/1
      CELERY_RESULT_BACKEND: redis://chatwoot_redis:6379/1
      FIRST_REPLY_INTRO_ENABLED: ${FIRST_REPLY_INTRO_ENABLED:-true}
      ASSISTANT_PUBLIC_INTRO: ${ASSISTANT_PUBLIC_INTRO:-Hola, soy Mundo, asistente de Capital Humano.}
      ANONYMIZED_TELEMETRY: "false"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - chroma_bge_m3:/app/chroma_db_bge_m3
      - ./.cache:/app/.cache
      - ./data:/app/data
    depends_on:
      - postgres
      - chatwoot_rails
    networks:
      default:
        aliases:
          - api.localhost
    restart: unless-stopped


  #######################################
  # CELERY BEAT / SEGUIMIENTO AUTOMÁTICO
  #######################################
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-rag-api:latest
    container_name: hr_beat
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hrdb}
      POSTGRES_USER: ${POSTGRES_USER:-hr_david}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_password}

      CHATWOOT_BASE_URL: http://chatwoot_rails:3000

      HF_HOME: /app/.cache
      SENTENCE_TRANSFORMERS_HOME: /app/.cache

      CELERY_BROKER_URL: redis://chatwoot_redis:6379/1
      CELERY_RESULT_BACKEND: redis://chatwoot_redis:6379/1
      TZ: America/Monterrey
      ANONYMIZED_TELEMETRY: "false"
    command:
      - sh
      - -c
      - celery -A app.tasks_seguimiento beat --loglevel=INFO -s /tmp/celerybeat-schedule
    volumes:
      - ./.cache:/app/.cache
    depends_on:
      - postgres
      - chatwoot_redis
      - worker
    restart: unless-stopped

  #######################################
  # CELERY WORKER / DEBOUNCE INBOUND CHATWOOT
  #######################################
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-rag-api:latest
    container_name: hr_worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hrdb}
      POSTGRES_USER: ${POSTGRES_USER:-hr_david}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_password}

      CHATWOOT_BASE_URL: http://chatwoot_rails:3000

      HF_HOME: /app/.cache
      SENTENCE_TRANSFORMERS_HOME: /app/.cache

      CELERY_BROKER_URL: redis://chatwoot_redis:6379/1
      CELERY_RESULT_BACKEND: redis://chatwoot_redis:6379/1
      FIRST_REPLY_INTRO_ENABLED: ${FIRST_REPLY_INTRO_ENABLED:-true}
      ASSISTANT_PUBLIC_INTRO: ${ASSISTANT_PUBLIC_INTRO:-Hola, soy Mundo, asistente de Capital Humano.}
      ANONYMIZED_TELEMETRY: "false"
    command:
      - sh
      - -c
      - celery -A app.tasks_chatwoot worker --loglevel=INFO -Q inbound
    volumes:
      - chroma_data:/app/chroma_db
      - chroma_bge_m3:/app/chroma_db_bge_m3
      - ./.cache:/app/.cache
      - ./data:/app/data
    depends_on:
      - postgres
      - chatwoot_rails
      - chatwoot_redis
    restart: unless-stopped

  #######################################
  # CHATWOOT POSTGRES CON PGVECTOR
  #######################################
  chatwoot_postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_password
    volumes:
      - chatwoot_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  #######################################
  # CHATWOOT REDIS
  #######################################
  chatwoot_redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot_redis_data:/data
    restart: unless-stopped

  #######################################
  # CHATWOOT RAILS
  #######################################
  chatwoot_rails:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_rails
    env_file:
      - .env.chatwoot
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_ENV: docker
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: info

      # Chatwoot público para Telegram.
      # NGROK_DOMAIN debe venir desde .env.
      FRONTEND_URL: https://${NGROK_DOMAIN}

      POSTGRES_HOST: chatwoot_postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_DB: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_password

      REDIS_URL: redis://chatwoot_redis:6379
      ACTIVE_STORAGE_SERVICE: local
      ENABLE_ACCOUNT_SIGNUP: "true"
    command:
      - sh
      - -c
      - rm -f /app/tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    restart: unless-stopped

  #######################################
  # CHATWOOT SIDEKIQ
  #######################################
  chatwoot_sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_sidekiq
    env_file:
      - .env.chatwoot
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_ENV: docker
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: info

      FRONTEND_URL: https://${NGROK_DOMAIN}

      POSTGRES_HOST: chatwoot_postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_DB: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_password

      REDIS_URL: redis://chatwoot_redis:6379
      ACTIVE_STORAGE_SERVICE: local
    command:
      - sh
      - -c
      - bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    restart: unless-stopped

  #######################################
  # N8N OPCIONAL / LABORATORIO / AUTOMATIZACIONES
  #######################################
  n8n:
    profiles:
      - lab
    image: n8nio/n8n:latest
    container_name: hr_n8n
    env_file:
      - .env
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      GENERIC_TIMEZONE: America/Mexico_City

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-hrdb}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-hr_david}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-hr_password}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    restart: unless-stopped

  #######################################
  # GATEWAY PUBLICO CHATWOOT + WEBHOOK API
  #######################################
  public-gateway:
    image: nginx:alpine
    container_name: public-gateway
    depends_on:
      - api
      - chatwoot_rails
    volumes:
      - ./deploy/nginx/public-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  #######################################
  # NGROK PUBLICANDO GATEWAY PUBLICO
  #######################################
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command:
      - "http"
      - "--log=stdout"
      - "--authtoken"
      - "${NGROK_AUTHTOKEN}"
      - "--domain"
      - "${NGROK_DOMAIN}"
      - "http://public-gateway:80"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_DOMAIN: ${NGROK_DOMAIN}
    ports:
      - "4040:4040"
    depends_on:
      - public-gateway
    restart: unless-stopped

volumes:
  chroma_data:
  chroma_bge_m3:
  n8n_data:
  pg_data:
  chatwoot_pg_data:
  chatwoot_redis_data:
  chatwoot_storage:
