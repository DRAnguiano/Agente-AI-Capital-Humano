services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-rag-api:latest
    container_name: hr_rag_api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      TOKENIZERS_PARALLELISM: "false"
      CHROMA_TELEMETRY_ENABLED: "false"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-1024}
      TOP_K: ${TOP_K:-3}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      REINDEX_CLEAN: ${REINDEX_CLEAN:-false}
      DATA_DIR: /app/data
      DB_DIR: /app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: hr_n8n
    ports:
      - "5678:5678"
    env_file:
      - ./.env
    environment:
      TZ: America/Monterrey
      N8N_EDITOR_BASE_URL: https://${NGROK_DOMAIN}
      WEBHOOK_URL: https://${NGROK_DOMAIN}/
      N8N_PROXY_HOPS: 1
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      - api

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command:
      - "http"
      - "--log=stdout"
      - "--authtoken"
      - "${NGROK_AUTHTOKEN}"
      - "--domain"
      - "${NGROK_DOMAIN}"
      - "http://n8n:5678"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_DOMAIN: ${NGROK_DOMAIN}
    ports:
      - "4040:4040"
    restart: unless-stopped
    depends_on:
      - n8n

volumes:
  chroma_data:
  n8n_data:
