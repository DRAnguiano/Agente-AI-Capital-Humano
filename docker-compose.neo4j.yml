services:
  neo4j:
    image: neo4j:5-community
    container_name: hr_neo4j
    # Do NOT use env_file here.
    # Neo4j converts every NEO4J_* environment variable into database config.
    # App variables such as NEO4J_URI or NEO4J_HEAP_INITIAL would become invalid
    # settings inside Neo4j and can cause restart loops.
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      # Keep Neo4j-specific settings explicit and minimal.
      server.memory.heap.initial_size: ${NEO4J_HEAP_INITIAL:-512m}
      server.memory.heap.max_size: ${NEO4J_HEAP_MAX:-1G}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./app/knowledge:/var/lib/neo4j/import
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
