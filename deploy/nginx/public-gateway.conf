# Rate limit zone — 10 MB stores ~160k IPs, 10 req/s per IP
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    # Docker internal DNS resolver — re-resolves upstream hostnames dynamically
    # so nginx survives container rebuilds without needing a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 25m;

    location = /health {
        set $api_upstream http://hr_rag_api:8000;
        proxy_pass $api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chatwoot/webhook {
        limit_req zone=webhook burst=20 nodelay;
        set $api_upstream http://hr_rag_api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /orchestrate/ {
        set $api_upstream http://hr_rag_api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $chatwoot_upstream http://chatwoot_rails:3000;
        proxy_pass $chatwoot_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /cable {
        set $chatwoot_upstream http://chatwoot_rails:3000;
        proxy_pass $chatwoot_upstream/cable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600;
    }

    location / {
        set $chatwoot_upstream http://chatwoot_rails:3000;
        proxy_pass $chatwoot_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
